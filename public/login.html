<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <!-- Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;

  /* Background image */
  background: url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b') no-repeat center center/cover;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* Dark overlay for readability */
body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 0;
}

/* Keep login card above overlay */
.login-card {
  position: relative;
  z-index: 1;
}

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 5px;
      color: #1e3c72;
    }

    .subtitle {
      font-size: 14px;
      color: gray;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2a5298;
    }

    .password-container {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 12px;
      cursor: pointer;
      font-size: 12px;
      color: #2a5298;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2a5298;
      color: white;
      border: none;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1e3c72;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h2>Faculty Management</h2>
    <div class="subtitle">Admin Login Portal</div>

    <input id="name" placeholder="👤 Name">
    <input id="email" placeholder="📧 Email">

    <div class="password-container">
      <input id="password" type="password" placeholder="🔒 Password">
      <span class="toggle" onclick="togglePassword()">Show</span>
    </div>

    <button onclick="login()">Login</button>

    <div id="message" class="message"></div>
  </div>

  <script>
    function togglePassword() {
      const pwd = document.getElementById("password");
      const toggle = document.querySelector(".toggle");

      if (pwd.type === "password") {
        pwd.type = "text";
        toggle.innerText = "Hide";
      } else {
        pwd.type = "password";
        toggle.innerText = "Show";
      }
    }

    async function login() {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://faculty-management-system-qcrk.onrender.com/auth/login", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    name: name,
    email: email,
    password: password
  })
});

const data = await res.json();
  console.log(data);

  const msg = document.getElementById("message");

  if (data.success) {
    msg.style.color = "green";
    msg.innerText = "✅ Login successful!";

    setTimeout(() => {
      window.location.href = "/dashboard.html"; // ✅ FIXED
    }, 1000);
  } else {
    msg.style.color = "red";
    msg.innerText = data.message || "❌ Invalid credentials";
  }
}
  </script>

</body>
</html>
